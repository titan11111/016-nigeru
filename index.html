<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SURVIVOR: DOUBLE JUMP</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-touch-callout: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: #000;
        color: #fff;
        font-family: 'Orbitron', sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #gameContainer {
        position: relative;
        width: 100%;
        max-width: 900px;
        height: 100vh;
        max-height: 600px;
        background: #000;
        border: 2px solid #00ffff;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        overflow: hidden;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }

    /* UI Overlay */
    .ui-layer {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
    }

    .hud {
        display: flex;
        justify-content: space-between;
        font-size: 1.2rem;
        text-shadow: 0 0 5px #fff;
        z-index: 10;
        width: 100%;
    }

    .timer-box {
        color: #ff00ff;
        text-shadow: 0 0 5px #ff00ff;
    }

    /* Message Screens */
    .message-screen {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        border: 2px solid #00ffff;
        padding: 40px;
        text-align: center;
        border-radius: 10px;
        backdrop-filter: blur(5px);
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 100;
        min-width: 300px;
        box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
    }

    h1, h2 {
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 5px;
        color: #00ffff;
        text-shadow: 2px 2px #ff00ff;
    }

    .sub-text {
        color: #aaa;
        font-size: 0.9rem;
        margin-bottom: 10px;
    }

    .btn {
        background: transparent;
        border: 2px solid #00ffff;
        color: #00ffff;
        padding: 15px 30px;
        font-family: 'Orbitron', sans-serif;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        text-transform: uppercase;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }

    .btn:hover {
        background: #00ffff;
        color: #000;
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        transform: scale(1.05);
    }

    .hidden { display: none !important; }

    /* Controls */
    .controls-area {
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        height: 140px;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 50;
    }

    .d-pad, .action-pad {
        pointer-events: auto;
        display: flex;
        gap: 15px;
        align-items: flex-end;
    }

    .action-pad {
        flex-direction: column;
        gap: 15px;
        justify-content: flex-end;
    }

    .ctrl-btn {
        width: 70px;
        height: 70px;
        background: rgba(0, 255, 255, 0.15);
        border: 2px solid rgba(0, 255, 255, 0.5);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        color: #00ffff;
        backdrop-filter: blur(4px);
        transition: 0.1s;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
    }

    .ctrl-btn:active {
        background: rgba(0, 255, 255, 0.6);
        color: #000;
        transform: scale(0.95);
    }
</style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div class="hud">
            <div>STAGE <span id="stageNum">1</span></div>
            <div class="timer-box">TIME: <span id="timer">60.00</span></div>
        </div>
    </div>

    <div class="controls-area" id="mobileControls">
        <div class="d-pad">
            <div class="ctrl-btn" id="btnLeft">←</div>
            <div class="ctrl-btn" id="btnRight">→</div>
        </div>
        <div class="action-pad">
            <div class="ctrl-btn" id="btnJump">J</div>
            <div class="ctrl-btn" id="btnSlide">S</div>
        </div>
    </div>

    <div id="startScreen" class="message-screen">
        <h1>NEON SURVIVOR</h1>
        <div class="sub-text">DOUBLE JUMP SYSTEM ONLINE</div>
        <p>1分間 生き残れ</p>
        <button class="btn" onclick="game.startStage(1)">MISSION START</button>
    </div>

    <div id="gameOverScreen" class="message-screen hidden">
        <h2 style="color:#ff3333;">CRITICAL ERROR</h2>
        <p>障害物衝突</p>
        <button class="btn" onclick="game.retryStage()">RETRY</button>
    </div>

    <div id="stageClearScreen" class="message-screen hidden">
        <h2 style="color:#33ff33;">AREA SECURED</h2>
        <p>次のレベルへ移行します</p>
        <button class="btn" onclick="game.nextStage()">NEXT LEVEL</button>
    </div>

    <div id="endingScreen" class="message-screen hidden">
        <h1 style="color:#ffff00;">ALL CLEAR</h1>
        <p>驚異的な反射神経です。<br>あなたは真のサバイバーです。</p>
        <button class="btn" onclick="location.reload()">BACK TO TITLE</button>
    </div>
</div>

<script>
    // Audio System (BGM / SE) - そのまま維持
    const audioSys = {
        bgm: new Audio('audio/run.mp3'),
        jump: new Audio('audio/tobu.mp3'),
        init: function() {
            this.bgm.loop = true;
            this.bgm.volume = 0.4;
            this.jump.volume = 0.5;
        },
        playBGM: function() { this.bgm.play().catch(()=>{}); },
        stopBGM: function() { this.bgm.pause(); this.bgm.currentTime = 0; },
        playJump: function() { 
            this.jump.currentTime = 0; 
            this.jump.play().catch(()=>{}); 
        }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const ui = {
        start: document.getElementById('startScreen'),
        gameOver: document.getElementById('gameOverScreen'),
        clear: document.getElementById('stageClearScreen'),
        ending: document.getElementById('endingScreen'),
        stage: document.getElementById('stageNum'),
        timer: document.getElementById('timer')
    };

    // --- Difficulty Balance ---
    const STAGE_CONFIG = {
        1: { name: "NIGHT CITY",  speed: 5,   minGap: 100, maxGap: 150, bgType: 'city' },    
        2: { name: "THE HARBOR",  speed: 6,   minGap: 90,  maxGap: 130, bgType: 'port' },    
        3: { name: "RESIDENTIAL", speed: 7.5, minGap: 70,  maxGap: 110, bgType: 'town' },    
        4: { name: "FACTORY",     speed: 9,   minGap: 50,  maxGap: 90,  bgType: 'factory' }, 
        5: { name: "MARS",        speed: 11,  minGap: 40,  maxGap: 70,  bgType: 'mars' }     
    };

    const TARGET_TIME = 60.0;

    // Game State
    let state = {
        running: false,
        stage: 1,
        timeLeft: TARGET_TIME,
        frameCount: 0,
        spawnTimer: 0,
        keys: {}
    };

    let player = {
        x: 100, y: 0, width: 40, height: 40,
        vy: 0, 
        jumpCount: 0,     
        maxJumps: 2,      
        isSliding: false,
        color: '#00ffff'
    };

    let obstacles = [];
    let bgObjects = [];
    let particles = [];

    const game = {
        init: function() {
            this.resize();
            window.addEventListener('resize', () => this.resize());
            this.bindControls();
            audioSys.init();
            this.generateBgElements(1);
            this.draw();
        },

        resize: function() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            player.y = canvas.height - 80;
        },

        startStage: function(lvl) {
            audioSys.playBGM();
            state.stage = lvl;
            state.running = true;
            state.timeLeft = TARGET_TIME;
            state.frameCount = 0;
            state.spawnTimer = 60; 
            
            player.x = 100;
            player.y = canvas.height - 80;
            player.vy = 0;
            player.jumpCount = 0;
            
            obstacles = [];
            particles = [];
            
            this.generateBgElements(lvl);
            
            ui.stage.innerText = lvl;
            ui.start.classList.add('hidden');
            ui.gameOver.classList.add('hidden');
            ui.clear.classList.add('hidden');
            ui.ending.classList.add('hidden');
            
            this.loop();
        },

        retryStage: function() {
            this.startStage(state.stage);
        },

        nextStage: function() {
            // エンディング判定
            if (state.stage < 5) {
                this.startStage(state.stage + 1);
            } else {
                ui.clear.classList.add('hidden');
                ui.ending.classList.remove('hidden');
                audioSys.stopBGM();
            }
        },

        loop: function() {
            if (!state.running) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            this.update();
            this.draw();
            requestAnimationFrame(() => this.loop());
        },

        update: function() {
            // Timer
            state.timeLeft -= 1/60;
            ui.timer.innerText = Math.max(0, state.timeLeft).toFixed(2);
            if (state.timeLeft <= 0) {
                this.stageClear();
                return;
            }

            state.frameCount++;
            const config = STAGE_CONFIG[state.stage];
            
            this.updatePlayer();
            this.updateBg(config.speed * 0.5);
            
            state.spawnTimer--;
            if (state.spawnTimer <= 0) {
                this.spawnObstacle(config);
                state.spawnTimer = Math.floor(Math.random() * (config.maxGap - config.minGap + 1)) + config.minGap;
            }

            this.updateObstacles(config.speed);
            this.updateParticles();
        },

        updatePlayer: function() {
            const speed = 6;
            const groundY = canvas.height - 80;

            if (state.keys['ArrowLeft']) player.x -= speed;
            if (state.keys['ArrowRight']) player.x += speed;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            player.vy += 0.9;
            player.y += player.vy;

            if (player.y >= groundY) {
                player.y = groundY;
                player.vy = 0;
                player.jumpCount = 0; 
            }

            player.isSliding = state.keys['ArrowDown'];
            player.height = player.isSliding ? 20 : 40;
            if (player.isSliding && player.y >= groundY) player.y = groundY + 20;
        },

        jump: function() {
            if (player.jumpCount < player.maxJumps) {
                if(player.jumpCount === 0) {
                    player.vy = -14; 
                } else {
                    player.vy = -12; 
                    this.createParticles(player.x + 20, player.y + 40, '#00ffff', 5); 
                }
                player.jumpCount++;
                player.isSliding = false; 
                audioSys.playJump();
            }
        },

        spawnObstacle: function(config) {
            const r = Math.random();
            let obs = { x: canvas.width, w: 40, h: 40, color: '#ff3333' };
            
            if (r < 0.4) { 
                obs.y = canvas.height - 80;
                obs.type = 'low';
            } else if (r < 0.7) { 
                obs.y = canvas.height - 150;
                obs.color = '#ffff00';
                obs.type = 'high';
            } else { 
                obs.w = 20; obs.h = 90;
                obs.y = canvas.height - 130;
                obs.color = '#ff00ff';
                obs.type = 'wall';
            }
            obstacles.push(obs);
        },

        updateObstacles: function(speed) {
            obstacles.forEach((obs, i) => {
                obs.x -= speed;
                
                const pBox = { 
                    x: player.x + 8, y: player.y + 8, 
                    w: player.width - 16, h: player.height - 16 
                };
                
                if (pBox.x < obs.x + obs.w && pBox.x + pBox.w > obs.x &&
                    pBox.y < obs.y + obs.h && pBox.y + pBox.h > obs.y) {
                    this.gameOver();
                }
                
                if (obs.x + obs.w < 0) obstacles.splice(i, 1);
            });
        },

        // --- Visuals (Background Generation Updated) ---
        generateBgElements: function(stage) {
            bgObjects = [];
            const type = STAGE_CONFIG[stage].bgType;
            // ステージごとの密度調整
            const count = (type === 'town') ? 40 : 25;
            for(let i=0; i<count; i++) {
                this.spawnBgObject(type, Math.random() * canvas.width);
            }
        },

        spawnBgObject: function(type, xVal) {
            let obj = { x: xVal, w: 0, h: 0, type: type, color: '#fff' };
            const ground = canvas.height - 40;

            if (type === 'city') {
                // Stage 1: Standard Cyberpunk City
                obj.w = 40 + Math.random() * 60; obj.h = 100 + Math.random() * 200;
                obj.y = ground - obj.h; obj.color = `hsl(220, 40%, ${10+Math.random()*15}%)`;
                obj.accent = '#00ffff';
                obj.windows = Math.random() > 0.4;

            } else if (type === 'port') {
                // Stage 2: Cyber Harbor (Containers & Cranes)
                if (Math.random() < 0.2) {
                    // Crane
                    obj.w = 20; obj.h = 150 + Math.random() * 50;
                    obj.y = ground - obj.h;
                    obj.color = '#111';
                    obj.accent = '#ffaa00'; // Neon Orange
                    obj.subType = 'crane';
                } else {
                    // Container
                    obj.w = 80 + Math.random() * 40; obj.h = 40 + Math.random() * 20;
                    obj.y = ground - obj.h - (Math.random()>0.4 ? 40:0); // Stacked
                    obj.color = Math.random()>0.5 ? '#002233' : '#331111'; // Dark Cyan or Rust
                    obj.accent = '#ff9900'; // Orange Warning lights
                    obj.subType = 'container';
                }

            } else if (type === 'town') {
                // Stage 3: Cyber Slums (High density)
                obj.w = 40 + Math.random() * 20; 
                obj.h = 60 + Math.random() * 100;
                obj.y = ground - obj.h; 
                obj.color = '#1a051a'; // Dark Purple
                obj.accent = '#ff00ff'; // Neon Pink
                obj.subType = 'house';

            } else if (type === 'factory') {
                // Stage 4: Toxic Factory
                obj.w = 30 + Math.random() * 60; 
                obj.h = 120 + Math.random() * 150; 
                obj.y = ground - obj.h; 
                obj.color = '#051105'; // Dark Green/Black
                obj.accent = '#00ff33'; // Toxic Green
                obj.subType = 'plant';
                obj.pipe = Math.random() > 0.5;

            } else if (type === 'mars') {
                // Stage 5: Mars (Unchanged)
                obj.w = 10 + Math.random()*80; obj.h = 20 + Math.random()*60; 
                obj.y = ground; obj.color = '#843'; obj.subType = 'rock';
            }
            bgObjects.push(obj);
        },

        updateBg: function(speed) {
            bgObjects.forEach(obj => {
                obj.x -= speed;
                if(obj.x + obj.w < -50) {
                    // Reset Logic
                    this.spawnBgObject(obj.type, canvas.width + Math.random()*50);
                    // 古いオブジェクトを削除して新しいのを追加する方が綺麗だが、
                    // 簡易的に位置とプロパティを再設定する（配列の入れ替え回避）
                    const newObj = bgObjects[bgObjects.length-1]; // spawnBgObjectで末尾に追加されたものを取得
                    Object.assign(obj, newObj); // プロパティをコピー
                    bgObjects.pop(); // 追加された分を消す
                }
            });
        },

        draw: function() {
            const w = canvas.width, h = canvas.height;
            
            // BG Colors (Atmosphere)
            const colors = {
                1: ['#050510', '#111'],            // City (Blue/Black)
                2: ['#020210', '#001a1a'],         // Port (Deep Sea/Oil)
                3: ['#100010', '#220022'],         // Town (Dark Purple)
                4: ['#000a00', '#0a1a0a'],         // Factory (Dark Green)
                5: ['#310', '#521']                // Mars (Red)
            };
            const [sky, gnd] = colors[state.stage] || colors[1];

            ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = gnd; ctx.fillRect(0, h-40, w, 40);

            // Draw BG Objects with Details
            bgObjects.forEach(obj => {
                ctx.fillStyle = obj.color;
                
                if(obj.subType === 'rock') {
                    // Mars Rocks
                    ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.w/2, 0, Math.PI, true); ctx.fill();
                } else if (obj.subType === 'crane') {
                    // Port Crane
                    ctx.fillRect(obj.x + 5, obj.y, 10, obj.h); // Pillar
                    ctx.strokeStyle = obj.accent; ctx.lineWidth = 2;
                    ctx.beginPath(); 
                    ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.x-40, obj.y+20); // Arm
                    ctx.stroke();
                    // Light
                    ctx.fillStyle = obj.accent; ctx.fillRect(obj.x+5, obj.y, 4, 4);

                } else if (obj.subType === 'container') {
                    // Port Container
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    ctx.strokeStyle = obj.accent; ctx.lineWidth = 1;
                    ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
                    // Diagonal detail
                    ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.x+obj.w, obj.y+obj.h); ctx.stroke();

                } else if (obj.subType === 'house') {
                    // Residential Units (Capsule style)
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    ctx.fillStyle = obj.accent; // Windows
                    for(let wy=obj.y+5; wy<obj.y+obj.h-5; wy+=12) {
                        ctx.fillRect(obj.x+4, wy, obj.w-8, 6);
                    }

                } else if (obj.subType === 'plant') {
                    // Factory with Pipes
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    if (obj.pipe) {
                        ctx.strokeStyle = '#555'; ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.moveTo(obj.x-10, obj.y+obj.h-20); ctx.lineTo(obj.x+obj.w+10, obj.y+obj.h-20); ctx.stroke();
                    }
                    // Toxic Light
                    ctx.fillStyle = obj.accent; 
                    ctx.fillRect(obj.x + obj.w/2 - 2, obj.y + 10, 4, obj.h - 20);

                } else {
                    // Default City Building
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    if(obj.windows) {
                        ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                        for(let wy=obj.y+10; wy<obj.y+obj.h-10; wy+=20) ctx.fillRect(obj.x+10, wy, 5, 10);
                    }
                }
            });

            // Grid Floor
            ctx.strokeStyle = (state.stage === 5) ? '#ff5500' : '#00ffff'; 
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, h-40); ctx.lineTo(w, h-40); ctx.stroke();

            // Player
            ctx.save();
            ctx.shadowBlur = 15; ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Double Jump Visual (Thrusters)
            if(player.jumpCount > 0) {
                ctx.fillStyle = '#ff9900';
                ctx.fillRect(player.x + 10, player.y + player.height, 20, 5);
            }
            ctx.restore();

            // Obstacles
            obstacles.forEach(obs => {
                ctx.save();
                ctx.shadowBlur = 10; ctx.shadowColor = obs.color;
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                // Detail
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(obs.x+5, obs.y+5, obs.w-10, obs.h-10);
                ctx.restore();
            });

            // Particles
            this.drawParticles();
        },

        createParticles: function(x, y, c, n) {
            for(let i=0; i<n; i++) particles.push({x, y, vx:(Math.random()-.5)*10, vy:(Math.random()-.5)*10, life:20, c});
        },
        updateParticles: function() {
            particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });
        },
        drawParticles: function() {
            particles.forEach(p => { ctx.globalAlpha=p.life/20; ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,4,4); });
            ctx.globalAlpha=1;
        },

        gameOver: function() {
            state.running = false;
            this.createParticles(player.x, player.y, '#f00', 30);
            this.draw();
            setTimeout(() => ui.gameOver.classList.remove('hidden'), 500);
        },

        stageClear: function() {
            state.running = false;
            ui.clear.classList.remove('hidden');
        },

        bindControls: function() {
            document.addEventListener('keydown', e => {
                state.keys[e.key] = true;
                if(state.running) {
                    if(e.key===' ' || e.key==='ArrowUp') { e.preventDefault(); this.jump(); }
                    if(e.key==='ArrowDown') e.preventDefault();
                }
            });
            document.addEventListener('keyup', e => state.keys[e.key] = false);

            const touch = (id, k, fn) => {
                const el = document.getElementById(id);
                const s = (e) => { e.preventDefault(); state.keys[k]=true; if(fn) fn(); };
                const e_ = (e) => { e.preventDefault(); state.keys[k]=false; };
                el.addEventListener('touchstart', s); el.addEventListener('touchend', e_);
                el.addEventListener('mousedown', s); el.addEventListener('mouseup', e_);
            };
            touch('btnLeft', 'ArrowLeft');
            touch('btnRight', 'ArrowRight');
            touch('btnJump', 'ArrowUp', ()=>this.jump());
            touch('btnSlide', 'ArrowDown');
        }
    };

    window.onload = () => game.init();

</script>
</body>
</html>
