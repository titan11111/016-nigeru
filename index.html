<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CYBER RUNNER 2077</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #050505;
            color: #00ffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            position: relative;
        }

        .game-header {
            background: rgba(0,20,40,0.8);
            border: 2px solid #00ffff;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        .game-header h1 {
            font-size: 1.8rem;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 5px;
        }

        .score {
            color: #ff00ff;
            font-size: 1rem;
        }

        #gameCanvas {
            width: 100%;
            height: auto;
            aspect-ratio: 2/1;
            border: 2px solid #00ffff;
            display: block;
            background: linear-gradient(180deg, #0f0f23 0%, #2a2a4e 100%);
        }

        /* モバイル用コントロール */
        .mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            z-index: 100;
        }

        .left-controls {
            position: absolute;
            left: 20px;
            bottom: 0;
            display: flex;
            gap: 10px;
        }

        .right-controls {
            position: absolute;
            right: 20px;
            bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(0,255,255,0.2);
            border: 2px solid #00ffff;
            color: #00ffff;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .control-btn:active {
            background: rgba(0,255,255,0.5);
            transform: scale(0.95);
        }

        /* オーバーレイ */
        .game-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,15,30,0.95);
            border: 2px solid #00ffff;
            padding: 30px;
            text-align: center;
            min-width: 280px;
            z-index: 200;
        }

        .game-overlay h2 {
            color: #00ffff;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }

        .game-overlay p {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .start-btn {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .start-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        /* モバイル表示調整 */
        @media (max-width: 768px) and (orientation: portrait) {
            .mobile-controls {
                display: block;
            }
            
            .game-container {
                padding: 5px;
            }

            .game-header h1 {
                font-size: 1.2rem;
            }

            #gameCanvas {
                aspect-ratio: 16/9;
            }
        }

        @media (max-width: 850px) and (orientation: landscape) {
            .mobile-controls {
                display: block;
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }

            .left-controls {
                left: 10px;
            }

            .right-controls {
                right: 10px;
            }
        }

        /* キーボード操作説明 */
        .keyboard-info {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .keyboard-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🤖 CYBER RUNNER 🤖</h1>
            <div class="score">
                STAGE: <span id="stage">1</span> / 5 | 
                SCORE: <span id="score">0</span> / <span id="target">200</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="keyboard-info">
            矢印キー: 移動 | SPACE: ジャンプ | ↓: しゃがみ
        </div>

        <!-- スタート画面 -->
        <div id="startScreen" class="game-overlay">
            <h2>CYBER RUNNER</h2>
            <p>ロボットを操作して<br>障害物を避けよう！</p>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>

        <!-- ゲームオーバー -->
        <div id="gameOverScreen" class="game-overlay hidden">
            <h2 id="resultTitle">GAME OVER</h2>
            <p>SCORE: <span id="finalScore">0</span></p>
            <button class="start-btn" onclick="restartGame()">RETRY</button>
        </div>

        <!-- ステージクリア -->
        <div id="stageClearScreen" class="game-overlay hidden">
            <h2>STAGE CLEAR!</h2>
            <p>SCORE: <span id="clearScore">0</span></p>
            <button class="start-btn" onclick="nextStage()">NEXT STAGE</button>
        </div>
    </div>

    <!-- モバイル用コントロール -->
    <div class="mobile-controls">
        <div class="left-controls">
            <div class="control-btn" id="leftBtn">←</div>
            <div class="control-btn" id="rightBtn">→</div>
        </div>
        <div class="right-controls">
            <div class="control-btn" id="jumpBtn">↑</div>
            <div class="control-btn" id="slideBtn">↓</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム状態
        let gameRunning = false;
        let score = 0;
        let currentStage = 1;
        let targetScore = 200;
        let gameSpeed = 4;
        let keys = {};

        // プレイヤー設定
        const player = {
            x: 100,
            y: 0,
            width: 40,
            height: 40,
            velocityY: 0,
            velocityX: 0,
            jumping: false,
            jumpCount: 0,
            maxJumps: 2,
            sliding: false,
            slideTimer: 0,
            color: '#00ffff'
        };

        // 障害物配列
        let obstacles = [];
        let particles = [];
        let backgroundBuildings = [];

        // Canvas初期設定
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            player.y = canvas.height - 80;
        }

        // ステージ設定
        const stageSettings = {
            1: { target: 200, speed: 4, obsChance: 0.015, highObsChance: 0.008 },
            2: { target: 500, speed: 5, obsChance: 0.02, highObsChance: 0.01 },
            3: { target: 1000, speed: 6, obsChance: 0.025, highObsChance: 0.012 },
            4: { target: 1500, speed: 7, obsChance: 0.03, highObsChance: 0.015 },
            5: { target: 2000, speed: 8, obsChance: 0.035, highObsChance: 0.018 }
        };

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('stageClearScreen').classList.add('hidden');
            
            gameRunning = true;
            score = 0;
            currentStage = 1;
            resetStage();
            gameLoop();
        }

        function resetStage() {
            const settings = stageSettings[currentStage];
            targetScore = settings.target;
            gameSpeed = settings.speed;
            
            obstacles = [];
            particles = [];
            backgroundBuildings = [];
            
            player.x = 100;
            player.y = canvas.height - 80;
            player.velocityY = 0;
            player.velocityX = 0;
            player.jumpCount = 0;
            player.sliding = false;
            player.slideTimer = 0;
            
            generateBackground();
            updateUI();
        }

        function generateBackground() {
            for (let i = 0; i < 10; i++) {
                backgroundBuildings.push({
                    x: Math.random() * canvas.width * 2,
                    y: canvas.height - 150 - Math.random() * 200,
                    width: 50 + Math.random() * 50,
                    height: 100 + Math.random() * 200,
                    color: `hsl(220, 30%, ${10 + Math.random() * 15}%)`
                });
            }
        }

        // 描画関数
        function drawBackground() {
            // 背景グラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(1, '#1a1a3a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ビル群
            ctx.globalAlpha = 0.3;
            backgroundBuildings.forEach(building => {
                ctx.fillStyle = building.color;
                ctx.fillRect(building.x, building.y, building.width, building.height);
            });
            ctx.globalAlpha = 1;

            // 地面
            ctx.fillStyle = '#111';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 20);
            ctx.lineTo(canvas.width, canvas.height - 20);
            ctx.stroke();
        }

        function drawPlayer() {
            ctx.save();
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;

            if (player.sliding && player.slideTimer > 0) {
                // しゃがみ状態
                ctx.fillRect(player.x, player.y + 20, player.width + 10, 20);
                // 目
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(player.x + 25, player.y + 25, 8, 4);
            } else {
                // 通常状態
                ctx.fillRect(player.x, player.y, player.width, player.height);
                // 目
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(player.x + 25, player.y + 10, 8, 6);
            }

            ctx.restore();
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = obs.color;

                if (obs.type === 'box') {
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                } else if (obs.type === 'high') {
                    // 上部障害物（しゃがみで回避）
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    // 警告マーク
                    ctx.fillStyle = '#ffff00';
                    ctx.font = '20px sans-serif';
                    ctx.fillText('⚠', obs.x + 35, obs.y + 25);
                } else if (obs.type === 'laser') {
                    // 縦レーザー（ジャンプで回避）
                    const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
                    ctx.globalAlpha = pulse;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.globalAlpha = 1;
                } else if (obs.type === 'item') {
                    ctx.beginPath();
                    ctx.arc(obs.x + 15, obs.y + 15, 15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px sans-serif';
                    ctx.fillText('+', obs.x + 10, obs.y + 20);
                }
            });
        }

        // 更新関数
        function updatePlayer() {
            // 横移動
            if (keys['ArrowLeft']) {
                player.velocityX = Math.max(player.velocityX - 0.8, -5);
            } else if (keys['ArrowRight']) {
                player.velocityX = Math.min(player.velocityX + 0.8, 5);
            } else {
                player.velocityX *= 0.85;
            }

            player.x += player.velocityX;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // ジャンプ処理
            player.velocityY += 0.6;
            player.y += player.velocityY;

            const groundY = canvas.height - 80;
            if (player.y >= groundY) {
                player.y = groundY;
                player.velocityY = 0;
                player.jumping = false;
                player.jumpCount = 0;
            }

            // しゃがみタイマー処理
            if (player.slideTimer > 0) {
                player.slideTimer--;
                if (player.slideTimer <= 0) {
                    player.sliding = false;
                }
            }
        }

        function updateObstacles() {
            // 障害物移動
            obstacles = obstacles.filter(obs => {
                obs.x -= gameSpeed;
                if (obs.x + obs.width < 0) {
                    if (obs.type !== 'item') score += 10;
                    return false;
                }
                return true;
            });

            // 背景ビル移動
            backgroundBuildings.forEach(building => {
                building.x -= gameSpeed * 0.3;
                if (building.x + building.width < 0) {
                    building.x = canvas.width + Math.random() * 200;
                }
            });

            // 新しい障害物生成
            const settings = stageSettings[currentStage];
            if (Math.random() < settings.obsChance) {
                generateObstacle();
            }
            if (Math.random() < settings.highObsChance) {
                generateHighObstacle();
            }
            if (Math.random() < 0.008) {
                generateItem();
            }
        }

        function generateObstacle() {
            const types = ['box', 'laser'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            if (type === 'box') {
                obstacles.push({
                    type: 'box',
                    x: canvas.width,
                    y: canvas.height - 60,
                    width: 40,
                    height: 40,
                    color: '#ff3333'
                });
            } else {
                obstacles.push({
                    type: 'laser',
                    x: canvas.width,
                    y: canvas.height - 100,
                    width: 20,
                    height: 80,
                    color: '#ff00ff'
                });
            }
        }

        function generateHighObstacle() {
            obstacles.push({
                type: 'high',
                x: canvas.width,
                y: canvas.height - 160,
                width: 100,
                height: 40,
                color: '#ff9900'
            });
        }

        function generateItem() {
            obstacles.push({
                type: 'item',
                x: canvas.width,
                y: canvas.height - 120 - Math.random() * 40,
                width: 30,
                height: 30,
                color: '#00ff00'
            });
        }

        // 衝突判定
        function checkCollisions() {
            const playerRect = {
                x: player.x,
                y: player.sliding && player.slideTimer > 0 ? player.y + 20 : player.y,
                width: player.sliding && player.slideTimer > 0 ? player.width + 10 : player.width,
                height: player.sliding && player.slideTimer > 0 ? 20 : player.height
            };

            obstacles.forEach((obs, index) => {
                if (playerRect.x < obs.x + obs.width &&
                    playerRect.x + playerRect.width > obs.x &&
                    playerRect.y < obs.y + obs.height &&
                    playerRect.y + playerRect.height > obs.y) {
                    
                    if (obs.type === 'item') {
                        score += 50;
                        obstacles.splice(index, 1);
                        createParticles(obs.x + 15, obs.y + 15);
                    } else {
                        gameOver();
                    }
                }
            });
        }

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 30,
                    color: '#00ff00'
                });
            }
        }

        function updateParticles() {
            ctx.save();
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
                
                return p.life > 0;
            });
            ctx.restore();
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            updatePlayer();
            drawPlayer();
            updateObstacles();
            drawObstacles();
            updateParticles();
            checkCollisions();

            updateUI();

            if (score >= targetScore) {
                if (currentStage >= 5) {
                    victory();
                } else {
                    stageClear();
                }
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('stage').textContent = currentStage;
            document.getElementById('target').textContent = targetScore;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('resultTitle').textContent = 'GAME OVER';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function victory() {
            gameRunning = false;
            document.getElementById('resultTitle').textContent = '🎉 COMPLETE! 🎉';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function stageClear() {
            gameRunning = false;
            document.getElementById('clearScore').textContent = score;
            document.getElementById('stageClearScreen').classList.remove('hidden');
        }

        function restartGame() {
            startGame();
        }

        function nextStage() {
            document.getElementById('stageClearScreen').classList.add('hidden');
            gameRunning = true;
            currentStage++;
            resetStage();
            gameLoop();
        }

        // 操作処理
        function jump() {
            if (player.jumpCount < player.maxJumps && !player.sliding) {
                player.velocityY = -12;
                player.jumping = true;
                player.jumpCount++;
                createParticles(player.x + 20, player.y + 40);
            }
        }

        function slide() {
            if (!player.jumping && player.slideTimer <= 0) {
                player.sliding = true;
                player.slideTimer = 30; // 0.5秒間しゃがみ
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (gameRunning) {
                if (e.key === ' ' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    jump();
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    slide();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // モバイル操作
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const jumpBtn = document.getElementById('jumpBtn');
        const slideBtn = document.getElementById('slideBtn');

        // タッチイベント用のヘルパー
        function addTouchEvent(elem, keyDown, keyUp) {
            elem.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (keyDown) keyDown();
            });
            elem.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (keyUp) keyUp();
            });
            elem.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (keyDown) keyDown();
            });
            elem.addEventListener('mouseup', (e) => {
                e.preventDefault();
                if (keyUp) keyUp();
            });
        }

        // 移動ボタン
        addTouchEvent(leftBtn, 
            () => keys['ArrowLeft'] = true,
            () => keys['ArrowLeft'] = false
        );
        addTouchEvent(rightBtn, 
            () => keys['ArrowRight'] = true,
            () => keys['ArrowRight'] = false
        );

        // アクションボタン
        addTouchEvent(jumpBtn, () => gameRunning && jump());
        addTouchEvent(slideBtn, () => gameRunning && slide());

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('load', () => {
            resizeCanvas();
        });

        // 初期化実行
        resizeCanvas();
    </script>
</body>
</html>
